<main>

    <!-- Contact Section -->
    <section id="contact" class="contact-section">

        <div class="contact-container">
            <h2>Contact Me</h2>

            <div class="contact-info">
                <p>Email:
                    <a href="mailto:gomolemolizzy010809@icloud.com">
                        gomolemolizzy010809@icloud.com
                    </a>
                </p>

                <p>GitHub:
                    <a href="https://github.com/lizzy09-dikgomo"
                       target="_blank"
                       rel="noopener noreferrer">
                       View My GitHub
                    </a>
                </p>

                <p>LinkedIn:
                    <a href="https://www.linkedin.com/in/YOUR-USERNAME"
                       target="_blank"
                       rel="noopener noreferrer">
                       View My LinkedIn
                    </a>
                </p>
            </div>

            <form id="contactForm">

                <input type="text"
                       id="name"
                       name="name"
                       placeholder="Your Name"
                       required>

                <input type="email"
                       id="email"
                       name="email"
                       placeholder="Your Email"
                       required>

                <textarea name="message"
                          placeholder="Your Message"
                          rows="5"
                          required></textarea>

                <button type="submit" class="btn">Send Message</button>

            </form>

        </div>

    </section>
